<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Order List</title></head>
<body>
    <h2 th:text="'Order History for ' + ${author}">Order History</h2>
    <table border="1">
        <tr>
            <th>Order ID</th>
            <th>Order Time</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.orderTime}"></td>
            <td th:text="${order.status}"></td>
            <td>
                <a th:href="@{/order/pay/{id}(id=${order.id})}">Pay Order</a>
            </td>
        </tr>
    </table>
</body>
</html>
