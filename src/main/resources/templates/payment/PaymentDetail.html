<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-header { background-color: #007bff; color: white; border-radius: 15px 15px 0 0 !important; }
        
        /* Badge bertema Biru */
        .badge-payment { padding: 8px 12px; border-radius: 50px; font-weight: 600; }
        .status-success { background-color: #004085; color: white; } /* Biru Tua */
        .status-rejected { background-color: #cfe2ff; color: #004085; border: 1px solid #b6d4fe; } /* Biru Pucat */
        .status-pending { background-color: #e7f1ff; color: #007bff; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center mt-5">
    <div class="card" style="width: 35rem;">
        <div class="card-header text-center">
            <h4 class="mb-0">Payment Summary</h4>
        </div>
        <div class="card-body p-4">
            <h6 class="text-muted mb-4 text-center" th:text="'Transaction ID: ' + ${payment.id}"></h6>
            
            <div class="row mb-3">
                <div class="col-5 font-weight-bold">Order ID</div>
                <div class="col-7 text-muted small" th:text="${payment.order.id}"></div>
            </div>
            
            <div class="row mb-3">
                <div class="col-5 font-weight-bold">Payment Method</div>
                <div class="col-7">
                    <span class="badge badge-light border" th:text="${payment.method}"></span>
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-5 font-weight-bold">Status</div>
                <div class="col-7">
                    <span th:class="${payment.status == 'SUCCESS'} ? 'badge-payment status-success' : (${payment.status == 'REJECTED'} ? 'badge-payment status-rejected' : 'badge-payment status-pending')" 
                          th:text="${payment.status}">
                    </span>
                </div>
            </div>
            
            <hr>
            <div class="text-center mt-4">
                <a th:href="@{/payment/detail}" class="btn btn-primary btn-block">Back to Search</a>
                <a th:href="@{/}" class="btn btn-link text-primary mt-2">Return to Home</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
