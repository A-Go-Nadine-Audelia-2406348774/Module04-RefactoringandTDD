<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Payment List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <h2>All Payments (Admin)</h2>
    
    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Payment ID</th>
            <th>Method</th>
            <th>Status</th>
            <th style="width: 150px">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}"></td>
            <td th:text="${payment.method}"></td>
            <td>
                <span th:class="${payment.status == 'SUCCESS'} ? 'badge badge-success' : (${payment.status == 'REJECTED'} ? 'badge badge-danger' : 'badge badge-secondary')" 
                      th:text="${payment.status}"></span>
            </td>
            <td>
                <a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}" class="btn btn-sm btn-info">Review</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
