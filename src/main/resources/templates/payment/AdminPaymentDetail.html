<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Review Payment</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <h3>Review Payment</h3>
    <div class="mb-4">
        <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
        <p><strong>Current Status:</strong> 
            <span th:class="${payment.status == 'SUCCESS'} ? 'badge badge-success' : (${payment.status == 'REJECTED'} ? 'badge badge-danger' : 'badge badge-secondary')" 
                  th:text="${payment.status}"></span>
        </p>
    </div>

    <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
        <div class="form-group">
            <label for="statusInput">Update Status to:</label>
            <select name="status" id="statusInput" class="form-control mb-4 col-4">
                <option value="SUCCESS">ACCEPT (SUCCESS)</option>
                <option value="REJECTED">REJECT (REJECTED)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-warning">Update Status</button>
        <a th:href="@{/payment/admin/list}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
