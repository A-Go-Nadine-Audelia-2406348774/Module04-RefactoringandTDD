<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Find Payment</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <h3>Find Payment Details</h3>
    <div class="form-group">
        <label for="paymentId">Payment ID</label>
        <input type="text" id="paymentId" class="form-control mb-4 col-4" placeholder="Enter Payment ID">
    </div>
    <button onclick="window.location.href='/payment/detail/' + document.getElementById('paymentId').value" class="btn btn-primary">Search</button>
</div>
</body>
</html>
